<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-안전소통보드 자동 생성기</title>
<style>
  body { font-family: 'NanumBarunGothic', 'Malgun Gothic', sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; }
  h1 { color: #003876; }
  textarea { width: 100%; height: 300px; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #003876; border-radius: 6px; }
  button { background: #003876; color: white; border: none; padding: 14px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
  button:hover { background: #002850; }
  button:disabled { background: #999; cursor: not-allowed; }
  .info { background: #f0f4f8; padding: 15px; border-left: 4px solid #003876; margin: 15px 0; border-radius: 4px; }
  #status { margin-top: 15px; padding: 10px; border-radius: 4px; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  .loading { background: #fff3cd; color: #856404; }
  #libStatus { font-size: 13px; margin-top: 10px; padding: 8px; border-radius: 4px; }
</style>
</head>
<body>
  <h1>🛡️ D-안전소통보드 자동 생성기</h1>
  <div class="info">
    <b>사용법:</b> 엑셀에서 데이터 복사 → 붙여넣기 → <b>[워드 파일 생성]</b> 클릭
  </div>
  <div id="libStatus" class="loading">⏳ 라이브러리 로딩 중...</div>
  <textarea id="input" placeholder="여기에 엑셀 데이터를 붙여넣으세요..."></textarea>
  <br>
  <button id="genBtn" onclick="generateWord()" disabled>📄 워드 파일 생성</button>
  <div id="status"></div>

<script>
const CDN_LIST = [
  'https://unpkg.com/docx@8.5.0/build/index.umd.js',
  'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js',
  'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js'
];
const FILESAVER_CDN = 'https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js';
const FONT = "나눔바른고딕";

function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => resolve(url);
    s.onerror = () => reject(url);
    document.head.appendChild(s);
  });
}

async function loadDocxLib() {
  const status = document.getElementById('libStatus');
  for (const url of CDN_LIST) {
    try {
      status.textContent = '⏳ 시도 중: ' + url;
      await loadScript(url);
      if (typeof docx !== 'undefined') return true;
    } catch(e) {}
  }
  return false;
}

(async () => {
  const status = document.getElementById('libStatus');
  const btn = document.getElementById('genBtn');
  try {
    await loadScript(FILESAVER_CDN);
    const ok = await loadDocxLib();
    if (ok && typeof docx !== 'undefined') {
      status.className = 'success';
      status.textContent = '✅ 라이브러리 로드 완료!';
      btn.disabled = false;
    } else {
      status.className = 'error';
      status.textContent = '❌ 모든 CDN 로드 실패';
    }
  } catch(e) {
    status.className = 'error';
    status.textContent = '❌ 로딩 오류: ' + e;
  }
})();

function setStatus(msg, cls) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = cls;
}

function parseExcelRow(text) {
  const fields = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === '\t' && !inQuote) { fields.push(cur); cur = ''; }
    else cur += c;
  }
  fields.push(cur);
  return fields;
}

function findDataRow(fullText) {
  const rows = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < fullText.length; i++) {
    const c = fullText[i];
    if (c === '"') { inQuote = !inQuote; cur += c; }
    else if ((c === '\n' || c === '\r') && !inQuote) {
      if (cur.trim()) rows.push(cur);
      cur = '';
      if (c === '\r' && fullText[i+1] === '\n') i++;
    } else cur += c;
  }
  if (cur.trim()) rows.push(cur);
  for (const row of rows) {
    const first = row.split('\t')[0].trim();
    if (/^\d{1,2}\/\d{1,2}$/.test(first)) return row;
  }
  return rows[rows.length - 1];
}

function splitByNumber(text) {
  if (!text) return [];
  const lines = text.split(/\r?\n/);
  const items = [];
  let current = null;
  for (let line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const m = trimmed.match(/^(\d+(?:-\d+)?)\.\s*(.*)/);
    const star = trimmed.match(/^\*\s*(.*)/);
    if (m) {
      if (current) items.push(current);
      current = { no: m[1], text: m[2] };
    } else if (star) {
      if (current) items.push(current);
      current = { no: '*', text: star[1] };
    } else if (current) current.text += ' ' + trimmed;
    else current = { no: '-', text: trimmed };
  }
  if (current) items.push(current);
  return items;
}

function mergeLocation(plant, place) {
  const norm = s => (s || '').replace(/\s+/g, '').trim();
  if (!plant) return place || '';
  if (!place) return plant;
  if (norm(plant) === norm(place)) return plant;
  return plant + " / " + place;
}

function splitJobNames(text) {
  if (!text) return [''];
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  if (lines.length > 1) return lines;
  const parts = text.split(/(?=\d+\.\s)/).map(s=>s.trim()).filter(s=>s);
  return parts.length > 0 ? parts : [text];
}

function generateWord() {
  try {
    if (typeof docx === 'undefined') {
      setStatus('❌ docx 라이브러리가 아직 로드되지 않았습니다.', 'error');
      return;
    }
    const raw = document.getElementById('input').value;
    if (!raw.trim()) { setStatus('❌ 데이터를 붙여넣어 주세요.', 'error'); return; }

    const dataRow = findDataRow(raw);
    const f = parseExcelRow(dataRow);

    const cctv = (f[f.length - 1] || '').trim();
    const monName = (f[f.length - 2] || '').trim();
    const monDept = (f[f.length - 3] || '').trim();

    const d = {
      일자: f[0] || '',
      운전공장: f[4] || '',
      작업장소: f[6] || '',
      작업명: f[7] || '',
      인원: parseInt(f[8]) || 1,
      작업시간: f[9] || '',
      협력사: f[10] || '',
      작업담당자: f[12] || '',
      협력사담당자: f[13] || '',
      잠재위험: f[14] || '',
      조치사항: f[15] || '',
      감시자소속: monDept,
      감시자이름: monName,
      CCTV: cctv
    };

    const risks = splitByNumber(d.잠재위험);
    const actions = splitByNumber(d.조치사항);
    const allNos = [...new Set([...risks.map(r=>r.no), ...actions.map(a=>a.no)])];
    const rows = allNos.map(no => ({
      no,
      risk: (risks.find(x=>x.no===no)||{}).text || '',
      action: (actions.find(x=>x.no===no)||{}).text || ''
    }));

    // ✅ 위험/조치 항목 수, 인원수에 따라 행 높이 자동 조정 (페이지 낭비 방지)
    buildDocx(d, rows);
    setStatus('✅ 워드 파일 다운로드 완료! (위험/조치 ' + rows.length + '개 / 인원 ' + d.인원 + '명)', 'success');
  } catch(e) {
    console.error(e);
    setStatus('❌ 오류: ' + e.message, 'error');
  }
}

function buildDocx(d, rows) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
          WidthType, AlignmentType, HeightRule, VerticalAlign } = docx;

  const CELL_MARGIN = { top: 100, bottom: 100, left: 120, right: 120 };

  function cell(text, opts = {}) {
    const texts = Array.isArray(text) ? text : String(text).split('\n');
    return new TableCell({
      shading: opts.shade ? { fill: "D9E2F3" } : undefined,
      columnSpan: opts.span,
      rowSpan: opts.rowSpan,
      verticalAlign: VerticalAlign.CENTER,
      margins: CELL_MARGIN,
      children: texts.map(t => new Paragraph({
        alignment: opts.align || AlignmentType.LEFT,
        spacing: { before: 30, after: 30, line: 280 },
        children: [new TextRun({
          text: String(t),
          bold: opts.bold || false,
          size: 20,
          font: FONT
        })]
      }))
    });
  }

  const 작업장소_통합 = mergeLocation(d.운전공장, d.작업장소);
  const 작업명_리스트 = splitJobNames(d.작업명);

  // ✅ 페이지 총량 계산 → 행 높이 자동 조정
  //   기본적으로 A4 세로 페이지에서 표들이 적절히 배치되도록 아래 로직 사용
  const 총항목 = rows.length;
  const 총인원 = d.인원;

  // 서명 행 높이: 인원이 적으면 크게, 많으면 줄여서 페이지 낭비 방지
  const 서명행높이 = 총인원 <= 8 ? 1100 : (총인원 <= 15 ? 850 : (총인원 <= 22 ? 700 : 600));
  // 위험/조치 행 높이: 항목 많으면 축소
  const 위험행높이 = 총항목 <= 6 ? 900 : (총항목 <= 10 ? 750 : 650);

  // ═══════════════════════════════════════════════════════════
  // ① 상단 정보 표 (일자행) - 작업명 넓게
  //    총 폭 10000 기준: 일자 1150 / 시간 1400 / 장소 1600 / 작업명 4700 / 인원 1150
  // ═══════════════════════════════════════════════════════════
  const infoTable1 = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    columnWidths: [1150, 1400, 1600, 4700, 1150],
    rows: [
      new TableRow({
        cantSplit: true,
        tableHeader: false,
        height: { value: 450, rule: HeightRule.ATLEAST },
        children: [
          cell("일자", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("작업시간", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("작업장소", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("작업명", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("작업인원", {shade:true, bold:true, align:AlignmentType.CENTER}),
        ]
      }),
      new TableRow({
        cantSplit: true,
        height: { value: 1100, rule: HeightRule.ATLEAST },
        children: [
          cell(d.일자, {align:AlignmentType.CENTER}),
          cell(d.작업시간, {align:AlignmentType.CENTER}),
          cell(작업장소_통합, {align:AlignmentType.CENTER}),
          cell(작업명_리스트),
          cell(d.인원 + "명", {align:AlignmentType.CENTER}),
        ]
      }),
    ]
  });

  // ═══════════════════════════════════════════════════════════
  // ② 담당자 표 (별도 분리) - 각 칸 내용에 맞게
  //    총 폭 10000: 작업담당자 1400 / 용역사 1600 / 용역사담당자 1600 / 안전모니터 3800 / CCTV 1600
  // ═══════════════════════════════════════════════════════════
  const infoTable2 = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    columnWidths: [1400, 1600, 1600, 3800, 1600],
    rows: [
      new TableRow({
        cantSplit: true,
        height: { value: 450, rule: HeightRule.ATLEAST },
        children: [
          cell("작업담당자", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("용역사(수행사)", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("용역사 담당자", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("안전Monitor요원", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("CCTV 가동", {shade:true, bold:true, align:AlignmentType.CENTER}),
        ]
      }),
      new TableRow({
        cantSplit: true,
        height: { value: 550, rule: HeightRule.ATLEAST },
        children: [
          cell(d.작업담당자, {align:AlignmentType.CENTER}),
          cell(d.협력사, {align:AlignmentType.CENTER}),
          cell(d.협력사담당자, {align:AlignmentType.CENTER}),
          cell(d.감시자이름 + (d.감시자소속 ? " ("+d.감시자소속+")" : ""), {align:AlignmentType.CENTER}),
          cell(d.CCTV === 'O' || d.CCTV.includes('가동') ? "가동 중(O)" : "미가동(X)", {align:AlignmentType.CENTER}),
        ]
      }),
    ]
  });

  // ═══════════════════════════════════════════════════════════
  // ③ 위험·조치 표 (cantSplit로 행 페이지 넘김 방지)
  // ═══════════════════════════════════════════════════════════
  const riskRows = [
    new TableRow({
      tableHeader: true,  // ✅ 헤더 반복
      cantSplit: true,
      height: { value: 450, rule: HeightRule.ATLEAST },
      children: [
        cell("No.", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("⚠ 잠재위험", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("✅ 안전 조치사항", {shade:true, bold:true, align:AlignmentType.CENTER}),
      ]
    })
  ];
  rows.forEach(r => {
    riskRows.push(new TableRow({
      cantSplit: true,  // ✅ 이 행이 두 페이지에 걸치지 않게
      height: { value: 위험행높이, rule: HeightRule.ATLEAST },
      children: [
        cell(r.no, {align:AlignmentType.CENTER, bold:true}),
        cell(r.risk),
        cell(r.action),
      ]
    }));
  });
  const riskTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    columnWidths: [700, 4650, 4650],
    rows: riskRows
  });

  // ═══════════════════════════════════════════════════════════
  // ④ 참석자 서명표 - ✅ 소속 칸 확대
  //    총 폭 10000: No 600 / 소속 2400 / 성명 1400 / 서명 1400 / 의견 4200
  // ═══════════════════════════════════════════════════════════
  const signRows = [
    new TableRow({
      tableHeader: true,
      cantSplit: true,
      height: { value: 450, rule: HeightRule.ATLEAST },
      children: [
        cell("No.", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("소속", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("성명", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("서명", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("종사자 의견 (위험요인, 개선 건의사항 및 안전다짐)", {shade:true, bold:true, align:AlignmentType.CENTER}),
      ]
    })
  ];
  for (let i = 1; i <= d.인원; i++) {
    signRows.push(new TableRow({
      cantSplit: true,
      height: { value: 서명행높이, rule: HeightRule.ATLEAST },  // ✅ 인원 수 따라 자동
      children: [
        cell(String(i), {align:AlignmentType.CENTER}),
        cell(""), cell(""), cell(""), cell("")
      ]
    }));
  }
  const signTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    columnWidths: [600, 2400, 1400, 1400, 4200],  // ✅ 소속 1800→2400
    rows: signRows
  });

  // ═══════════════════════════════════════════════════════════
  // ⑤ 현장 조치 결과 (상하 2행)
  // ═══════════════════════════════════════════════════════════
  const 조치행높이 = 총인원 <= 10 ? 1700 : 1400;  // 서명 인원 많으면 살짝 축소
  const finalTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    columnWidths: [7000, 3000],
    rows: [
      new TableRow({
        cantSplit: true,
        height: { value: 450, rule: HeightRule.ATLEAST },
        children: [
          cell("종사자 의견에 대한 현장 조치 결과 (즉시 개선사항 기재)", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("용역사 현장소장 확인", {shade:true, bold:true, align:AlignmentType.CENTER}),
        ]
      }),
      new TableRow({
        cantSplit: true,
        height: { value: 조치행높이, rule: HeightRule.ATLEAST },
        children: [
          cell(""),
          cell(["", "(서명)", ""], {align:AlignmentType.CENTER}),
        ]
      }),
      new TableRow({
        cantSplit: true,
        height: { value: 450, rule: HeightRule.ATLEAST },
        children: [
          cell("종사자 의견에 대한 현장 조치 결과 (즉시 개선사항 기재)", {shade:true, bold:true, align:AlignmentType.CENTER}),
          cell("현장소장 확인", {shade:true, bold:true, align:AlignmentType.CENTER}),
        ]
      }),
      new TableRow({
        cantSplit: true,
        height: { value: 조치행높이, rule: HeightRule.ATLEAST },
        children: [
          cell(""),
          cell(["", "(서명)", ""], {align:AlignmentType.CENTER}),
        ]
      }),
    ]
  });

  const 소제목 = (text) => new Paragraph({
    spacing: { before: 200, after: 100 },
    keepNext: true,  // ✅ 소제목이 표와 떨어져 페이지 넘어가지 않게
    children: [new TextRun({ text, bold: true, size: 24, font: FONT })]
  });

  const 빈줄 = () => new Paragraph({
    spacing: { before: 0, after: 0 },
    children: [new TextRun({ text: "", font: FONT, size: 12 })]
  });

  const doc = new Document({
    styles: {
      default: {
        document: {
          run: { font: FONT, size: 20 }
        }
      }
    },
    sections: [{
      properties: {
        page: {
          margin: { top: 720, right: 720, bottom: 720, left: 720 }
        }
      },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 200 },
          children: [new TextRun({ text: "[ D-안전소통보드 및 종사자 의견 청취서 ]", bold: true, size: 32, font: FONT })]
        }),
        소제목("1. 작업 기본 정보"),
        infoTable1,
        빈줄(),  // ✅ 두 표 사이 살짝 간격
        infoTable2,
        소제목("2. 주요 작업순서별 잠재위험 및 안전 조치사항"),
        new Paragraph({
          spacing: { after: 100 },
          keepNext: true,
          children: [new TextRun({ text: "※ 관리감독자는 아래 사항을 작업자들에게 전파하고 지적확인을 실시해 주십시오.", size: 18, italics: true, font: FONT })]
        }),
        riskTable,
        소제목("3. 참석자 서명 및 종사자 의견 청취"),
        signTable,
        소제목("4. 현장 조치 결과 및 확인 (현장소장 작성란)"),
        finalTable,
      ]
    }]
  });

  Packer.toBlob(doc).then(blob => {
    const safe = (작업장소_통합 || 'output').replace(/[\/\\:*?"<>|]/g,'_');
    saveAs(blob, `D-안전소통보드_${d.일자.replace('/','')}_${safe}.docx`);
  });
}
</script>
</body>
</html>
