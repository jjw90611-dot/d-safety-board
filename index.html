<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>D-안전소통보드 자동 생성기</title>
<!-- ✅ 검증된 CDN (jsdelivr, UMD 빌드) -->
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
  body { font-family: 'Malgun Gothic', sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; }
  h1 { color: #003876; }
  textarea { width: 100%; height: 300px; font-family: monospace; font-size: 12px; padding: 10px; border: 2px solid #003876; border-radius: 6px; }
  button { background: #003876; color: white; border: none; padding: 14px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
  button:hover { background: #002850; }
  .info { background: #f0f4f8; padding: 15px; border-left: 4px solid #003876; margin: 15px 0; border-radius: 4px; }
  #status { margin-top: 15px; padding: 10px; border-radius: 4px; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  #libStatus { font-size: 12px; color: #666; margin-top: 5px; }
</style>
</head>
<body>
  <h1>🛡️ D-안전소통보드 자동 생성기</h1>
  <div class="info">
    <b>사용법:</b> 엑셀에서 <b>데이터 행</b>을 통째로 복사(헤더 포함되어도 OK)한 후 붙여넣고 <b>[워드 파일 생성]</b> 버튼을 클릭하세요.
  </div>
  <textarea id="input" placeholder="여기에 엑셀 데이터를 붙여넣으세요..."></textarea>
  <br>
  <button onclick="generateWord()">📄 워드 파일 생성</button>
  <div id="libStatus"></div>
  <div id="status"></div>

<script>
// 라이브러리 로드 확인
window.addEventListener('load', () => {
  const ls = document.getElementById('libStatus');
  if (typeof docx === 'undefined') {
    ls.textContent = '⚠️ docx 라이브러리 로드 실패 - 네트워크 확인 필요';
    ls.style.color = 'red';
  } else {
    ls.textContent = '✅ 라이브러리 정상 로드됨 (docx v' + (docx.version || '8.5.0') + ')';
    ls.style.color = 'green';
  }
});

function setStatus(msg, isError) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = isError ? 'error' : 'success';
}

// 엑셀 붙여넣기 파싱 (탭 구분 + 따옴표 안 줄바꿈 처리)
function parseExcelRow(text) {
  const fields = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQuote && text[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === '\t' && !inQuote) {
      fields.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  fields.push(cur);
  return fields;
}

// 전체 텍스트에서 "데이터 행"만 찾기 (날짜로 시작하는 행)
function findDataRow(fullText) {
  // 따옴표 안 줄바꿈은 유지, 따옴표 밖 줄바꿈만 행 구분자로 사용
  const rows = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < fullText.length; i++) {
    const c = fullText[i];
    if (c === '"') {
      inQuote = !inQuote;
      cur += c;
    } else if ((c === '\n' || c === '\r') && !inQuote) {
      if (cur.trim()) rows.push(cur);
      cur = '';
    } else {
      cur += c;
    }
  }
  if (cur.trim()) rows.push(cur);
  
  // 날짜 패턴(M/D 또는 MM/DD)으로 시작 + 탭이 여러 개 있는 행 찾기
  for (const row of rows) {
    const firstField = row.split('\t')[0].trim();
    if (/^\d{1,2}\/\d{1,2}$/.test(firstField) && row.split('\t').length > 10) {
      return row;
    }
  }
  return rows[rows.length - 1]; // 못 찾으면 마지막 행
}

// 잠재위험/조치사항을 번호별로 분리
function splitByNumber(text) {
  if (!text) return [];
  const lines = text.split(/\r?\n/);
  const items = [];
  let current = null;
  for (let line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const match = trimmed.match(/^(\d+(?:-\d+)?\.|\*|※)\s*(.*)/);
    if (match) {
      if (current) items.push(current);
      current = { no: match[1].replace('.',''), text: match[2] };
    } else if (current) {
      current.text += ' ' + trimmed;
    } else {
      current = { no: '-', text: trimmed };
    }
  }
  if (current) items.push(current);
  return items;
}

function generateWord() {
  try {
    if (typeof docx === 'undefined') {
      setStatus('❌ docx 라이브러리가 로드되지 않았습니다. 페이지를 새로고침 하세요.', true);
      return;
    }

    const raw = document.getElementById('input').value;
    if (!raw.trim()) { setStatus('❌ 데이터를 붙여넣어 주세요.', true); return; }

    const dataRow = findDataRow(raw);
    const f = parseExcelRow(dataRow);
    console.log('데이터 행:', dataRow);
    console.log('파싱된 필드 수:', f.length);
    console.log('필드 목록:', f);

    // 컬럼 자동 감지 (날짜가 [0], 그 다음 NO, 고위험, 부서... 순)
    const data = {
      일자: f[0] || '',
      NO: f[1] || '',
      고위험: f[2] || '',
      운전부서: f[3] || '',
      운전공장: f[4] || '',
      작업지시부서: f[5] || '',
      작업장소: f[6] || '',
      작업명: f[7] || '',
      인원: parseInt(f[8]) || 1,
      작업시간: f[9] || '',
      협력사: f[10] || '',
      하도사: f[11] || '',
      작업담당자: f[12] || '',
      협력사담당자: f[13] || '',
      잠재위험: f[14] || '',
      조치사항: f[15] || '',
      감시자소속: f[27] || f[f.length-3] || '',
      감시자이름: f[28] || f[f.length-2] || '',
      CCTV: (f[29] || f[f.length-1] || '').trim()
    };

    console.log('매핑된 데이터:', data);

    const risks = splitByNumber(data.잠재위험);
    const actions = splitByNumber(data.조치사항);

    // 번호 매칭
    const allNos = [...new Set([...risks.map(r=>r.no), ...actions.map(a=>a.no)])];
    const rows = allNos.map(no => ({
      no: no,
      risk: (risks.find(x => x.no === no) || {}).text || '',
      action: (actions.find(x => x.no === no) || {}).text || ''
    }));

    buildDocx(data, rows);
    setStatus('✅ 워드 파일이 생성되어 다운로드되었습니다! (항목 ' + rows.length + '개)', false);
  } catch (e) {
    console.error(e);
    setStatus('❌ 오류: ' + e.message, true);
  }
}

function buildDocx(d, rows) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle } = docx;

  function cell(text, opts = {}) {
    const texts = Array.isArray(text) ? text : String(text).split('\n');
    return new TableCell({
      shading: opts.shade ? { fill: "D9E2F3" } : undefined,
      columnSpan: opts.span,
      children: texts.map(t => new Paragraph({
        alignment: opts.align || AlignmentType.LEFT,
        children: [new TextRun({ text: String(t), bold: opts.bold || false, size: 20 })]
      }))
    });
  }

  const infoTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [
        cell("일자", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("작업시간", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("작업장소", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("작업명", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("작업인원", {shade:true, bold:true, align:AlignmentType.CENTER}),
      ]}),
      new TableRow({ children: [
        cell(d.일자, {align:AlignmentType.CENTER}),
        cell(d.작업시간, {align:AlignmentType.CENTER}),
        cell(d.운전공장 + "\n" + d.작업장소, {align:AlignmentType.CENTER}),
        cell(d.작업명),
        cell(d.인원 + "명", {align:AlignmentType.CENTER}),
      ]}),
      new TableRow({ children: [
        cell("작업담당자", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("용역사(수행사)", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("용역사 담당자", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("안전Monitor요원", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("CCTV 가동", {shade:true, bold:true, align:AlignmentType.CENTER}),
      ]}),
      new TableRow({ children: [
        cell(d.작업담당자, {align:AlignmentType.CENTER}),
        cell(d.협력사, {align:AlignmentType.CENTER}),
        cell(d.협력사담당자, {align:AlignmentType.CENTER}),
        cell(d.감시자이름 + (d.감시자소속 ? " ("+d.감시자소속+")" : ""), {align:AlignmentType.CENTER}),
        cell(d.CCTV === 'O' || d.CCTV.includes('가동') ? "가동 중(O)" : "미가동(X)", {align:AlignmentType.CENTER}),
      ]}),
    ]
  });

  const riskRows = [
    new TableRow({ children: [
      cell("No.", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("⚠ 잠재위험", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("✅ 안전 조치사항", {shade:true, bold:true, align:AlignmentType.CENTER}),
    ]})
  ];
  rows.forEach(r => {
    riskRows.push(new TableRow({ children: [
      cell(r.no, {align:AlignmentType.CENTER, bold:true}),
      cell(r.risk),
      cell(r.action),
    ]}));
  });
  const riskTable = new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: riskRows });

  const signRows = [
    new TableRow({ children: [
      cell("No.", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("소속", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("성명", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("서명", {shade:true, bold:true, align:AlignmentType.CENTER}),
      cell("종사자 의견 (위험요인, 개선 건의사항 및 안전다짐)", {shade:true, bold:true, align:AlignmentType.CENTER}),
    ]})
  ];
  for (let i = 1; i <= d.인원; i++) {
    signRows.push(new TableRow({ children: [
      cell(String(i), {align:AlignmentType.CENTER}),
      cell(""), cell(""), cell("(서명)", {align:AlignmentType.CENTER}), cell("")
    ]}));
  }
  const signTable = new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: signRows });

  const finalTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [
        cell("종사자 의견에 대한 현장 조치 결과 (즉시 개선사항 기재)", {shade:true, bold:true, align:AlignmentType.CENTER}),
        cell("용역사 현장소장 확인", {shade:true, bold:true, align:AlignmentType.CENTER}),
      ]}),
      new TableRow({ children: [
        cell(["", "", "", ""]),
        cell("(서명)", {align:AlignmentType.CENTER}),
      ]}),
    ]
  });

  const doc = new Document({
    sections: [{
      children: [
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "[ D-안전소통보드 및 종사자 의견 청취서 ]", bold: true, size: 32 })] }),
        new Paragraph({ children: [new TextRun({ text: " " })] }),
        new Paragraph({ children: [new TextRun({ text: "1. 작업 기본 정보", bold: true, size: 24 })] }),
        infoTable,
        new Paragraph({ children: [new TextRun({ text: " " })] }),
        new Paragraph({ children: [new TextRun({ text: "2. 주요 작업순서별 잠재위험 및 안전 조치사항 (TBM 리딩용)", bold: true, size: 24 })] }),
        new Paragraph({ children: [new TextRun({ text: "※ 관리감독자는 아래 사항을 작업자들에게 전파하고 지적확인을 실시해 주십시오.", size: 18, italics: true })] }),
        riskTable,
        new Paragraph({ children: [new TextRun({ text: " " })] }),
        new Paragraph({ children: [new TextRun({ text: "3. 참석자 서명 및 종사자 의견 청취", bold: true, size: 24 })] }),
        signTable,
        new Paragraph({ children: [new TextRun({ text: " " })] }),
        new Paragraph({ children: [new TextRun({ text: "4. 현장 조치 결과 및 확인", bold: true, size: 24 })] }),
        finalTable,
      ]
    }]
  });

  Packer.toBlob(doc).then(blob => {
    const safe = (d.작업장소 || 'output').replace(/[\/\\:*?"<>|]/g,'_');
    saveAs(blob, `D-안전소통보드_${d.일자.replace('/','')}_${safe}.docx`);
  });
}
</script>
</body>
</html>
